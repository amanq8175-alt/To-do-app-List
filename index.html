<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Tasks - Responsive Todo Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />

    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lightpurple: '#E0BBE4',
                        darkpurple: '#957DAD',
                        primary: '#5D3A9B',
                        secondary: '#D8B4E2',
                        accent: '#C8A2C8'
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 8s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'slide-in': 'slideIn 0.5s ease-out forwards',
                        'bounce-in': 'bounceIn 0.8s ease-out forwards',
                        'wiggle': 'wiggle 0.8s ease-in-out',
                        'glow': 'glow 2s ease-in-out infinite alternate'
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } },
                        fadeIn: { '0%': { opacity: 0, transform: 'translateY(15px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        slideIn: { '0%': { opacity: 0, transform: 'translateX(30px)' }, '100%': { opacity: 1, transform: 'translateX(0)' } },
                        bounceIn: { '0%': { opacity: 0, transform: 'scale(0.8)' }, '50%': { transform: 'scale(1.05)' }, '100%': { opacity: 1, transform: 'scale(1)' } },
                        wiggle: { '0%, 100%': { transform: 'rotate(0deg)' }, '25%': { transform: 'rotate(-3deg)' }, '75%': { transform: 'rotate(3deg)' } },
                        glow: { '0%': { boxShadow: '0 0 5px rgba(149, 125, 173, 0.3)' }, '100%': { boxShadow: '0 0 20px rgba(149, 125, 173, 0.6)' } }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-lightpurple">
    <div class="fixed top-5 left-5 w-24 h-24 rounded-full bg-secondary opacity-20 pulse-bg desktop-only"></div>
    <div class="fixed bottom-16 right-5 w-36 h-36 rounded-full bg-primary opacity-10 floating-element desktop-only"></div>
    
    <div class="bubble" style="width: 50px; height: 50px; top: 20%; left: 15%; animation-duration: 12s;"></div>
    <div class="bubble" style="width: 40px; height: 40px; top: 70%; left: 20%; animation-duration: 20s; animation-delay: 3s;"></div>

    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <header class="text-center mb-8 header-container">
            <h1 class="text-3xl md:text-4xl font-bold text-primary mb-2 flex items-center justify-center gap-2 md:gap-3 header-title">
                <i class="fas fa-magic text-2xl md:text-3xl animate-pulse"></i>
                <span>To Do app List</span>
            </h1>
            <p class="text-darkpurple text-base md:text-lg font-medium header-subtitle">Illuminate your productivity</p>
        </header>
        
        <div class="bg-white rounded-2xl shadow-xl p-4 md:p-6 mb-6 md:mb-8 task-card add-task-container">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="taskInput" placeholder="Add a new task..." class="flex-1 input-focus rounded-xl border border-gray-300 px-4 py-3 md:px-5 md:py-4 text-base md:text-lg focus:outline-none">
                <button id="addTaskBtn" class="add-btn bg-gradient-to-r from-primary to-darkpurple text-white font-semibold rounded-xl px-4 py-3 md:px-6 md:py-4 transition-all shadow-lg flex items-center justify-center gap-2 min-w-[120px]">
                    <i class="fas fa-plus"></i>
                    <span class="add-btn-text hidden xs:inline">Add Task</span>
                </button>
            </div>
        </div>
        
        <div class="stats-grid grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 md:gap-4 mb-6">
            <div class="stat-card bg-white rounded-xl p-3 md:p-4 text-center shadow-md task-card">
                <p class="stat-title text-darkpurple font-medium text-xs md:text-sm">Total Tasks</p>
                <p id="totalTasks" class="stat-value text-xl md:text-2xl font-bold text-primary mt-1">0</p>
            </div>
            <div class="stat-card bg-white rounded-xl p-3 md:p-4 text-center shadow-md task-card">
                <p class="stat-title text-darkpurple font-medium text-xs md:text-sm">Completed</p>
                <p id="completedTasks" class="stat-value text-xl md:text-2xl font-bold text-primary mt-1">0</p>
            </div>
            <div class="stat-card bg-white rounded-xl p-3 md:p-4 text-center shadow-md task-card">
                <p class="stat-title text-darkpurple font-medium text-xs md:text-sm">Pending</p>
                <p id="pendingTasks" class="stat-value text-xl md:text-2xl font-bold text-primary mt-1">0</p>
            </div>
        </div>
        
        <div class="filter-container flex flex-wrap justify-center gap-2 mb-6">
            <button id="allFilter" class="filter-btn bg-lightpurple text-darkpurple active text-sm md:text-base">All</button>
            <button id="activeFilter" class="filter-btn bg-lightpurple text-darkpurple text-sm md:text-base">Active</button>
            <button id="completedFilter" class="filter-btn bg-lightpurple text-darkpurple text-sm md:text-base">Completed</button>
        </div>
        
        <div id="taskList" class="space-y-3 md:space-y-4 max-h-[55vh] md:max-h-[50vh] overflow-y-auto pr-1 md:pr-2 pb-2"></div>
        
        <div id="emptyState" class="text-center py-10 md:py-12 empty-state hidden">
            <div class="inline-block p-5 md:p-6 rounded-full bg-secondary bg-opacity-30 mb-4 md:mb-6 animate-bounce empty-icon">
                <i class="fas fa-clipboard-list text-4xl md:text-5xl text-primary"></i>
            </div>
            <h3 class="empty-title text-xl md:text-2xl font-semibold text-darkpurple mb-2">Your tasks await</h3>
            <p class="empty-desc text-gray-600 mx-auto max-w-md">Add your first task to illuminate your day!</p>
        </div>
        
        <div class="text-center mt-6 md:mt-8">
            <button id="clearCompletedBtn" class="clear-btn bg-white text-primary font-medium rounded-xl px-5 py-2.5 md:px-6 md:py-3 transition-all flex items-center justify-center mx-auto">
                <i class="fas fa-eraser mr-1 md:mr-2"></i>
                <span>Clear Completed</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
